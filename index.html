<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声绘搭子</title>
    <style>
        :root {
            --bg-1: #fff8f4;
            --bg-2: #eef7ff;
            --bg-3: #f7f0ff;
            --text-main: #1f2430;
            --text-soft: #667085;
            --panel: rgba(255, 255, 255, 0.74);
            --line: rgba(31, 36, 48, 0.1);
            --shadow: 0 24px 80px rgba(31, 36, 48, 0.14);
            --accent: #e78fa6;
            --accent-soft: #fff1f5;
            --accent-deep: #8e3958;
            --user-accent: linear-gradient(135deg, #1c9dd9 0%, #7f6bff 100%);
            --parallax-x: 0px;
            --parallax-y: 0px;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei UI", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(255, 170, 188, 0.45), transparent 28%),
                radial-gradient(circle at top right, rgba(125, 182, 255, 0.42), transparent 24%),
                radial-gradient(circle at bottom left, rgba(255, 218, 155, 0.34), transparent 24%),
                linear-gradient(140deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
            padding: 24px;
        }

        /* Accessibility: Visible focus rings */
        *:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .shell {
            max-width: 1220px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.15fr 0.95fr;
            gap: 18px;
        }

        .panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 24px 48px rgba(31, 36, 48, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.3);
        }

        .hero-copy, .persona-card, .character-rail, .chat-panel, .composer-panel {
            border-radius: 30px;
        }

        .hero-copy {
            padding: 28px 30px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .eyebrow,
        .chip,
        .character-pill,
        .persona-title {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            min-height: 36px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(31, 36, 48, 0.08);
            background: rgba(255,255,255,0.82);
            font-size: 12px;
        }

        .eyebrow {
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text-soft);
            gap: 10px;
        }

        .eyebrow::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-deep));
        }

        h1, .persona-name {
            font-family: "Palatino Linotype", "STKaiti", serif;
        }

        .hero-copy h1 {
            margin: 18px 0 12px;
            font-size: clamp(36px, 5vw, 60px);
            line-height: 1.02;
        }

        .hero-copy p,
        .persona-summary,
        .persona-tagline,
        .character-summary,
        .chat-subtitle,
        .composer-hint {
            color: var(--text-soft);
            line-height: 1.7;
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .chip {
            min-height: 44px;
        }

        .persona-card {
            position: relative;
            overflow: hidden;
            isolation: isolate;
            padding: 24px;
            display: grid;
            grid-template-columns: minmax(220px, 260px) 1fr;
            gap: 20px;
            align-items: center;
            --card-glow: color-mix(in srgb, var(--accent) 68%, white 32%);
            --card-glow-deep: color-mix(in srgb, var(--accent-deep) 76%, transparent 24%);
        }

        .persona-card::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), var(--accent), var(--accent-deep), rgba(255,255,255,0.72));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask-composite: exclude;
            opacity: .9;
            animation: personaBorderShift 8s linear infinite;
            pointer-events: none;
        }

        .persona-card::after {
            content: "";
            position: absolute;
            inset: -22% auto auto -10%;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(255,255,255,0.88), color-mix(in srgb, var(--accent) 52%, white 48%) 38%, transparent 72%);
            opacity: .55;
            filter: blur(8px);
            animation: personaGlowPulse 6s ease-in-out infinite;
            pointer-events: none;
        }

        .persona-visual {
            position: relative;
            min-height: 280px;
            border-radius: 30px;
            display: grid;
            place-items: center;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 24%, rgba(255,255,255,0.95), transparent 34%),
                linear-gradient(160deg, rgba(255,255,255,0.92), color-mix(in srgb, var(--accent-soft) 78%, white 22%) 58%, rgba(255,255,255,0.82));
            transform-style: preserve-3d;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .persona-ambient,
        .persona-ripple,
        .persona-sheen,
        .persona-noise {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .persona-ambient {
            background:
                radial-gradient(circle at 24% 22%, rgba(255,255,255,0.86), transparent 22%),
                radial-gradient(circle at 74% 20%, color-mix(in srgb, var(--accent) 44%, white 56%), transparent 26%),
                radial-gradient(circle at 50% 78%, color-mix(in srgb, var(--accent-deep) 22%, white 78%), transparent 34%);
            transform: translate3d(calc(var(--parallax-x) * -0.18), calc(var(--parallax-y) * -0.18), 0);
        }

        .persona-sheen {
            background: linear-gradient(125deg, transparent 18%, rgba(255,255,255,0.62) 48%, transparent 78%);
            mix-blend-mode: screen;
            opacity: .75;
            transform: translate3d(calc(var(--parallax-x) * 0.3), calc(var(--parallax-y) * 0.3), 0);
        }

        .persona-noise {
            opacity: .22;
            background-image:
                radial-gradient(circle at 20% 24%, rgba(255,255,255,0.9) 0 2px, transparent 2px),
                radial-gradient(circle at 78% 28%, rgba(255,255,255,0.8) 0 1.5px, transparent 1.5px),
                radial-gradient(circle at 35% 76%, rgba(255,255,255,0.72) 0 1.5px, transparent 1.5px),
                radial-gradient(circle at 68% 68%, rgba(255,255,255,0.72) 0 1.5px, transparent 1.5px);
            transform: translate3d(calc(var(--parallax-x) * -0.08), calc(var(--parallax-y) * -0.08), 0);
        }

        .persona-ripple {
            inset: 50% auto auto 50%;
            width: 132px;
            height: 132px;
            margin-left: -66px;
            margin-top: -66px;
            border-radius: 50%;
            border: 1.5px solid color-mix(in srgb, var(--accent) 55%, white 45%);
            opacity: 0;
            transform: scale(.7);
        }

        .persona-card[data-speaking="true"] .persona-ripple {
            animation: personaRipple 1.7s ease-out infinite;
        }

        .persona-card[data-speaking="true"] .persona-ripple-2 { animation-delay: .28s; }
        .persona-card[data-speaking="true"] .persona-ripple-3 { animation-delay: .56s; }

        .persona-portrait-shell {
            position: relative;
            width: 178px;
            height: 220px;
            display: grid;
            place-items: center;
            transform-style: preserve-3d;
            transform:
                translate3d(calc(var(--parallax-x) * 0.34), calc(var(--parallax-y) * 0.34), 0)
                rotateX(calc(var(--parallax-y) * -0.08deg))
                rotateY(calc(var(--parallax-x) * 0.08deg));
            transition: transform .18s ease-out;
        }

        .persona-portrait-shell::before {
            content: "";
            position: absolute;
            inset: 18px 14px 14px;
            border-radius: 34px;
            background: linear-gradient(180deg, rgba(255,255,255,0.76), rgba(255,255,255,0.1));
            box-shadow: 0 28px 54px color-mix(in srgb, var(--accent-deep) 24%, transparent 76%);
            filter: blur(0.5px);
        }

        .persona-portrait-shell::after {
            content: "";
            position: absolute;
            inset: -8px;
            border-radius: 42px;
            background: radial-gradient(circle, color-mix(in srgb, var(--accent) 40%, white 60%), transparent 68%);
            opacity: .7;
            filter: blur(18px);
            z-index: -1;
            animation: personaGlowPulse 4.2s ease-in-out infinite;
        }

        .persona-orbit {
            position: absolute;
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: 1px dashed color-mix(in srgb, var(--accent) 38%, white 62%);
            opacity: .75;
            transform: translate3d(calc(var(--parallax-x) * -0.2), calc(var(--parallax-y) * -0.2), 0);
            animation: personaOrbit 18s linear infinite;
        }

        .persona-mark {
            position: relative;
            width: 148px;
            height: 188px;
            border-radius: 38px;
            font-size: 64px;
            font-family: "Palatino Linotype", "STKaiti", serif;
            letter-spacing: .08em;
            overflow: hidden;
            animation: personaBreath 4.8s ease-in-out infinite;
            transform: translateZ(22px);
            box-shadow:
                0 22px 44px rgba(0,0,0,0.16),
                inset 0 1px 0 rgba(255,255,255,0.36);
        }

        .persona-media {
            position: absolute;
            inset: 0;
            width: 148px;
            height: 188px;
            margin: auto;
            object-fit: cover;
            border-radius: 38px;
            animation: personaBreath 4.8s ease-in-out infinite;
            transform: translateZ(22px);
            box-shadow:
                0 22px 44px rgba(0,0,0,0.16),
                inset 0 1px 0 rgba(255,255,255,0.36);
        }

        .persona-mark::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 26% 20%, rgba(255,255,255,0.46), transparent 26%),
                linear-gradient(180deg, rgba(255,255,255,0.16), transparent 42%);
            pointer-events: none;
        }

        .persona-mark::after {
            content: "";
            position: absolute;
            inset: auto -12% -16% -12%;
            height: 56%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.3), transparent 68%);
            opacity: .92;
            pointer-events: none;
        }

        .persona-meta { display: grid; gap: 10px; position: relative; z-index: 1; }
        .persona-kicker {
            font-size: 12px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text-soft);
        }
        .persona-name { margin: 0; font-size: clamp(28px, 3vw, 42px); line-height: 1.1; }
        .persona-title { background: var(--accent-soft); color: var(--accent-deep); font-weight: 700; }

        @keyframes personaBreath {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.025); }
        }

        @keyframes personaGlowPulse {
            0%, 100% { opacity: .5; transform: scale(.96); }
            50% { opacity: .85; transform: scale(1.05); }
        }

        @keyframes personaBorderShift {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(18deg); }
        }

        @keyframes personaRipple {
            0% { opacity: .7; transform: scale(.7); }
            80% { opacity: 0; transform: scale(1.52); }
            100% { opacity: 0; transform: scale(1.64); }
        }

        @keyframes personaOrbit {
            from { transform: rotate(0deg) translate3d(calc(var(--parallax-x) * -0.2), calc(var(--parallax-y) * -0.2), 0); }
            to { transform: rotate(360deg) translate3d(calc(var(--parallax-x) * -0.2), calc(var(--parallax-y) * -0.2), 0); }
        }
        .character-rail {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        .character-card {
            min-height: 120px;
            border-radius: 22px;
            border: 1px solid rgba(31,36,48,0.08);
            background: rgba(255,255,255,0.76);
            padding: 16px;
            cursor: pointer;
            text-align: left;
            transition: transform .2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow .2s ease, border-color .2s ease;
        }

        .character-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 34px rgba(31,36,48,0.12);
        }

        .character-card:active {
            transform: scale(0.96);
        }

        .character-card.active {
            border-color: transparent;
            background: linear-gradient(180deg, rgba(255,255,255,.92), var(--accent-soft));
            box-shadow: 0 20px 38px rgba(31,36,48,0.16);
            transform: translateY(-2px);
        }

        .character-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .character-mark {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            font-family: "Palatino Linotype", "STKaiti", serif;
        }

        .character-pill {
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-soft);
        }

        .character-name {
            margin: 14px 0 8px;
            font-size: 18px;
            font-weight: 700;
        }

        .chat-panel {
            padding: 18px;
            display: grid;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            padding: 10px 10px 16px;
            border-bottom: 1px solid var(--line);
        }

        .chat-label {
            font-size: 12px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        .chat-title {
            font-size: 20px;
            font-weight: 700;
            margin-top: 6px;
        }

        .chat-container {
            min-height: 340px;
            max-height: 54vh;
            overflow-y: auto;
            padding: 18px 10px 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(31, 36, 48, 0.2) transparent;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(31, 36, 48, 0.15);
            border-radius: 10px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(31, 36, 48, 0.25);
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            animation: riseIn .18s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .character-mark, .avatar {
            display: grid;
            place-items: center;
            color: white;
            background: linear-gradient(145deg, var(--accent), var(--accent-deep));
            box-shadow: 0 18px 34px rgba(0,0,0,0.12);
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            font-size: 22px;
            font-family: "Palatino Linotype", "STKaiti", serif;
            flex: none;
        }

        .message.user .avatar {
            background: linear-gradient(145deg, #68c3ff, #5a6bff);
            order: 1;
        }

        .message-body {
            max-width: min(72%, 680px);
            display: grid;
            gap: 10px;
        }

        .message-bubble,
        .audio-player,
        .typing-bubble,
        .input-shell {
            border: 1px solid rgba(31,36,48,0.08);
            background: rgba(255,255,255,0.9);
        }

        .message-bubble {
            padding: 14px 16px;
            border-radius: 22px;
            line-height: 1.72;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .assistant .message-bubble { border-top-left-radius: 8px; }
        .user .message-bubble {
            color: white;
            background: var(--user-accent);
            border: none;
            border-top-right-radius: 8px;
            box-shadow: 0 18px 32px rgba(92,103,255,0.22);
        }

        .audio-player {
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 18px;
            padding: 12px 14px;
        }

        .play-btn, .send-btn {
            border: none;
            cursor: pointer;
            color: white;
            background: linear-gradient(145deg, var(--accent), var(--accent-deep));
            transition: transform .18s ease, opacity .18s ease;
        }

        .media-action-btn {
            width: fit-content;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 14px;
            font-weight: 700;
            background: linear-gradient(145deg, var(--accent), var(--accent-deep));
            box-shadow: 0 16px 28px rgba(0,0,0,0.12);
            transition: transform .2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity .2s ease;
        }

        .play-btn {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            font-size: 15px;
        }

        .play-btn:hover,
        .send-btn:hover,
        .media-action-btn:hover {
            transform: translateY(-2px);
        }

        .play-btn:active,
        .send-btn:active,
        .media-action-btn:active {
            transform: scale(0.96);
        }

        .waveform {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 4px;
            height: 28px;
        }

        .wave-bar {
            width: 4px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--accent), var(--accent-deep));
            animation: none;
        }

        .wave-bar.playing {
            animation: wave .7s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: scaleY(.45); }
            50% { transform: scaleY(1); }
        }

        .download-btn {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid rgba(31,36,48,0.08);
            background: rgba(255,255,255,0.92);
            font-size: 13px;
            font-weight: 700;
            transition: transform .2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .download-btn:hover {
            transform: translateY(-2px);
        }
        
        .download-btn:active {
            transform: scale(0.96);
        }

        .typing-bubble {
            display: flex;
            gap: 6px;
            padding: 12px 14px;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-bubble span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1s ease-in-out infinite;
        }

        .typing-bubble span:nth-child(2) { animation-delay: .15s; }
        .typing-bubble span:nth-child(3) { animation-delay: .3s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: .5; }
            50% { transform: translateY(-6px); opacity: 1; }
        }

        .composer-panel {
            padding: 16px;
            display: grid;
            gap: 14px;
        }

        .composer-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .input-shell {
            border-radius: 24px;
            padding: 10px 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .input-shell:focus-within {
            background: rgba(255,255,255,0.9);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft), inset 0 1px 0 rgba(255,255,255,0.75);
        }

        #messageInput {
            width: 100%;
            min-height: 88px;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-main);
            font: inherit;
            line-height: 1.7;
            padding: 6px 8px;
        }

        #messageInput::placeholder { color: #8e97a8; }

        .send-btn {
            min-width: 156px;
            min-height: 56px;
            padding: 0 20px;
            border-radius: 20px;
            box-shadow: 0 20px 34px rgba(0,0,0,0.16);
            font-size: 15px;
            font-weight: 700;
        }

        .send-btn:disabled {
            opacity: .58;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @media (max-width: 1024px) {
            .hero { grid-template-columns: 1fr; }
            .character-rail { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 720px) {
            body { padding: 14px; }
            .hero-copy, .persona-card, .character-rail, .chat-panel, .composer-panel { border-radius: 24px; }
            .persona-card { grid-template-columns: 84px 1fr; padding: 18px; }
            .persona-mark { width: 84px; height: 84px; border-radius: 24px; font-size: 32px; }
            .character-rail { grid-template-columns: 1fr; }
            .chat-container { max-height: none; min-height: 300px; }
            .message-body { max-width: 84%; }
            .composer-form { grid-template-columns: 1fr; }
            .send-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <article class="hero-copy panel">
                <div>
                    <div class="eyebrow">Voice Role Lab</div>
                    <h1>和你的二次元搭子聊会天</h1>
                    <p>挑一个角色人格，抽一个二次元名字，让她用不同的语气陪你闲聊、接梗或安慰你。</p>
                </div>
                <div class="status-row">
                    <div class="chip" id="statusChipTitle">当前登场：月光治愈系</div>
                    <div class="chip" id="statusChipVoice">音色：default_zh</div>
                </div>
            </article>

            <aside class="persona-card panel" id="personaCard" data-speaking="false">
                <div class="persona-visual" id="personaVisual">
                    <div class="persona-ambient"></div>
                    <div class="persona-sheen"></div>
                    <div class="persona-noise"></div>
                    <div class="persona-ripple persona-ripple-1"></div>
                    <div class="persona-ripple persona-ripple-2"></div>
                    <div class="persona-ripple persona-ripple-3"></div>
                    <div class="persona-orbit"></div>
                    <div class="persona-portrait-shell">
                        <img class="persona-media persona-image" id="personaImage" alt="角色立绘" hidden>
                        <video class="persona-media persona-video" id="personaVideo" muted loop playsinline hidden></video>
                        <div class="persona-mark" id="personaPortrait">澪</div>
                    </div>
                </div>
                <div class="persona-meta">
                    <div class="persona-kicker">Current Partner</div>
                    <h2 class="persona-name" id="personaName">月城诗音</h2>
                    <div class="persona-title" id="personaTitle">月光治愈系</div>
                    <p class="persona-summary" id="personaSummary">轻声慢语，像深夜窗边那盏没关的小灯。</p>
                    <p class="persona-tagline" id="personaTagline">适合安静聊天和情绪陪伴</p>
                    <button class="media-action-btn" id="generateVideoBtn" type="button">生成角色视频</button>
                </div>
            </aside>
        </section>

        <section class="character-rail panel" id="characterRail"></section>

        <section class="chat-panel panel">
            <div class="chat-header">
                <div>
                    <div class="chat-label">Character Channel</div>
                    <div class="chat-title" id="chatTitle">月城诗音的对话窗</div>
                    <div class="chat-subtitle" id="chatSubtitle">切换角色时会抽一个新的二次元名字。</div>
                </div>
                <div class="chip" id="chatRoleChip">gentle</div>
            </div>
            <div class="chat-container" id="chatContainer"></div>
        </section>

        <section class="composer-panel panel">
            <div class="composer-hint" id="composerHint">和月城诗音说点什么吧。回车发送，Shift + 回车换行。</div>
            <div class="composer-form">
                <label class="input-shell" for="messageInput">
                    <textarea id="messageInput" placeholder="比如：今天有点累，陪我聊一会儿。"></textarea>
                </label>
                <button class="send-btn" id="sendBtn" type="button">发送到她的频道</button>
            </div>
        </section>
    </main>

    <script>
        const fallbackCatalog = {
            gentle: { title: "月光治愈系", summary: "轻声慢语，像深夜窗边那盏没关的小灯。", tagline: "适合安静聊天和情绪陪伴", mark: "澪", accent: "#E78FA6", accent_soft: "#FFF1F5", accent_deep: "#8E3958", candidate_names: ["月城诗音", "白羽澄铃", "神乐纱雾", "朝雾千夏"], tts_style: "gentle soft warm", portrait_prompt: "", portrait_url: "", video_prompt: "", video_url: "" },
            cheerful: { title: "元气甜心系", summary: "亮晶晶、反应快，带一点可爱的活力和小雀跃。", tagline: "适合轻松闲聊和打气鼓劲", mark: "莓", accent: "#FF9F5B", accent_soft: "#FFF4E8", accent_deep: "#9A4C16", candidate_names: ["七濑阳菜", "天宫铃奈", "月岛柚叶", "桃宫千璃"], tts_style: "happy lively energetic", portrait_prompt: "", portrait_url: "", video_prompt: "", video_url: "" },
            cool: { title: "冷冽前辈系", summary: "克制、利落、带一点距离感，但不会真的伤人。", tagline: "适合干脆直接的对话节奏", mark: "凛", accent: "#6C88E8", accent_soft: "#EEF3FF", accent_deep: "#27438D", candidate_names: ["九条凛月", "雾岛绫音", "东云千鹤", "白银澪"], tts_style: "calm cool steady", portrait_prompt: "", portrait_url: "", video_prompt: "", video_url: "" },
            humorous: { title: "怪话吐槽系", summary: "会接梗，会抖机灵，气氛感很强，但不油腻。", tagline: "适合整活、接梗和灵动互动", mark: "桃", accent: "#8B6FE8", accent_soft: "#F4EFFF", accent_deep: "#4A329B", candidate_names: ["真白柚子", "望月团子", "猫宫小满", "八寻桃"], tts_style: "happy playful humorous", portrait_prompt: "", portrait_url: "", video_prompt: "", video_url: "" },
            taiwan_sweet: { title: "台湾甜妹系", summary: "语气黏一点、笑意甜一点，讲话像薄荷汽水一样轻快。", tagline: "适合撒娇感闲聊和甜口陪伴", mark: "糖", accent: "#73D4BE", accent_soft: "#EEFFF9", accent_deep: "#2F8F7B", candidate_names: ["林可晴", "许语棠", "陈又晴", "叶星柔"], tts_style: "sweet gentle Taiwanese accent", portrait_prompt: "", portrait_url: "", video_prompt: "", video_url: "" }
        };

        let currentCharacter = "gentle";
        let currentCharacterName = "";
        let currentVoice = "default_zh";
        let characterCatalog = fallbackCatalog;
        let messageHistory = [];
        let currentAudio = null;
        let currentMediaRequestToken = 0;
        let personaMediaState = {};
        const VIDEO_TASK_POLL_INTERVAL_MS = 2000;
        const VIDEO_TASK_MAX_POLLS = 20;

        const chatContainer = document.getElementById("chatContainer");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");

        function pickRandomName(names) {
            return names[Math.floor(Math.random() * names.length)];
        }

        function metaFor(character = currentCharacter) {
            return characterCatalog[character] || fallbackCatalog.gentle;
        }

        function applyAccent(meta) {
            document.documentElement.style.setProperty("--accent", meta.accent);
            document.documentElement.style.setProperty("--accent-soft", meta.accent_soft);
            document.documentElement.style.setProperty("--accent-deep", meta.accent_deep);
        }

        function mediaStateFor(character = currentCharacter) {
            if (!personaMediaState[character]) {
                const meta = metaFor(character);
                personaMediaState[character] = {
                    imageUrl: meta.portrait_url || "",
                    videoUrl: meta.video_url || "",
                    videoTaskId: "",
                    videoTaskStatus: ""
                };
            }
            return personaMediaState[character];
        }

        function updateVideoButton() {
            const button = document.getElementById("generateVideoBtn");
            if (!button) {
                return;
            }
            const media = mediaStateFor();
            const isPending = media.videoTaskStatus === "PROCESSING" && !!media.videoTaskId;
            button.disabled = isPending;
            button.textContent = isPending ? "视频生成中..." : "生成角色视频";
        }

        function renderPersonaMedia() {
            const media = mediaStateFor();
            const personaImage = document.getElementById("personaImage");
            const personaVideo = document.getElementById("personaVideo");
            const personaPortrait = document.getElementById("personaPortrait");

            if (media.videoUrl) {
                personaVideo.src = media.videoUrl;
                personaVideo.hidden = false;
                personaImage.hidden = true;
                personaPortrait.hidden = true;
                personaVideo.play().catch(() => {});
                updateVideoButton();
                return;
            }

            personaVideo.pause();
            personaVideo.removeAttribute("src");
            personaVideo.load();
            personaVideo.hidden = true;

            if (media.imageUrl) {
                personaImage.src = media.imageUrl;
                personaImage.hidden = false;
                personaPortrait.hidden = true;
                updateVideoButton();
                return;
            }

            personaImage.removeAttribute("src");
            personaImage.hidden = true;
            personaPortrait.hidden = false;
            updateVideoButton();
        }

        async function requestCharacterPortrait() {
            const requestToken = ++currentMediaRequestToken;
            const response = await fetch("/api/character-media/image", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character: currentCharacter, prompt: metaFor().portrait_prompt })
            });
            const data = await response.json();
            if (requestToken !== currentMediaRequestToken || !data.success || !data.media_url) {
                return;
            }
            mediaStateFor().imageUrl = data.media_url;
            renderPersonaMedia();
        }

        async function pollCharacterVideoTask(taskId, requestToken, character) {
            for (let attempt = 0; attempt < VIDEO_TASK_MAX_POLLS; attempt += 1) {
                if (requestToken !== currentMediaRequestToken || character !== currentCharacter) {
                    return;
                }

                const response = await fetch(`/api/character-media/video/${taskId}`);
                const data = await response.json();
                if (requestToken !== currentMediaRequestToken || character !== currentCharacter) {
                    return;
                }

                const media = mediaStateFor(character);
                if (!data.success) {
                    media.videoTaskId = "";
                    media.videoTaskStatus = "";
                    renderPersonaMedia();
                    return;
                }

                media.videoTaskStatus = data.task_status || "PROCESSING";
                if (data.media_url) {
                    media.videoUrl = data.media_url;
                    media.videoTaskId = "";
                    media.videoTaskStatus = "SUCCESS";
                    renderPersonaMedia();
                    return;
                }

                if (media.videoTaskStatus === "FAIL") {
                    media.videoTaskId = "";
                    renderPersonaMedia();
                    return;
                }

                renderPersonaMedia();
                await new Promise((resolve) => setTimeout(resolve, VIDEO_TASK_POLL_INTERVAL_MS));
            }

            if (requestToken !== currentMediaRequestToken || character !== currentCharacter) {
                return;
            }

            const media = mediaStateFor(character);
            media.videoTaskId = "";
            media.videoTaskStatus = "";
            renderPersonaMedia();
        }

        async function requestCharacterVideo() {
            const requestToken = ++currentMediaRequestToken;
            const character = currentCharacter;
            const media = mediaStateFor(character);
            media.videoUrl = "";
            media.videoTaskId = "";
            media.videoTaskStatus = "PROCESSING";
            renderPersonaMedia();
            const response = await fetch("/api/character-media/video", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character, prompt: metaFor(character).video_prompt })
            });
            const data = await response.json();
            if (requestToken !== currentMediaRequestToken || character !== currentCharacter) {
                return;
            }
            if (!data.success || !data.task_id) {
                media.videoTaskStatus = "";
                renderPersonaMedia();
                return;
            }
            media.videoTaskId = data.task_id;
            media.videoTaskStatus = data.task_status || "PROCESSING";
            renderPersonaMedia();
            await pollCharacterVideoTask(data.task_id, requestToken, character);
        }

        function renderPersona() {
            const meta = metaFor();
            applyAccent(meta);
            document.getElementById("personaPortrait").textContent = meta.mark;
            document.getElementById("personaName").textContent = currentCharacterName;
            document.getElementById("personaTitle").textContent = meta.title;
            document.getElementById("personaSummary").textContent = meta.summary;
            document.getElementById("personaTagline").textContent = meta.tagline;
            document.getElementById("statusChipTitle").textContent = `当前登场：${meta.title}`;
            document.getElementById("statusChipVoice").textContent = `音色：${currentVoice}`;
            document.getElementById("chatTitle").textContent = `${currentCharacterName}的对话窗`;
            document.getElementById("chatSubtitle").textContent = meta.tagline;
            document.getElementById("chatRoleChip").textContent = currentCharacter;
            document.getElementById("composerHint").textContent = `和${currentCharacterName}说点什么吧。回车发送，Shift + 回车换行。`;
            sendBtn.textContent = `发送到${currentCharacterName}`;
            renderPersonaMedia();
        }

        function setPersonaSpeaking(isSpeaking) {
            const personaCard = document.getElementById("personaCard");
            personaCard.dataset.speaking = isSpeaking ? "true" : "false";
        }

        function bindPersonaParallax() {
            const personaCard = document.getElementById("personaCard");
            if (!personaCard || window.matchMedia("(pointer: coarse)").matches || window.innerWidth <= 720) {
                document.documentElement.style.setProperty("--parallax-x", "0px");
                document.documentElement.style.setProperty("--parallax-y", "0px");
                return;
            }

            const updateParallax = (event) => {
                const rect = personaCard.getBoundingClientRect();
                const offsetX = ((event.clientX - rect.left) / rect.width - 0.5) * 18;
                const offsetY = ((event.clientY - rect.top) / rect.height - 0.5) * 18;
                document.documentElement.style.setProperty("--parallax-x", `${offsetX.toFixed(2)}px`);
                document.documentElement.style.setProperty("--parallax-y", `${offsetY.toFixed(2)}px`);
            };

            const resetParallax = () => {
                document.documentElement.style.setProperty("--parallax-x", "0px");
                document.documentElement.style.setProperty("--parallax-y", "0px");
            };

            personaCard.addEventListener("pointermove", updateParallax);
            personaCard.addEventListener("pointerleave", resetParallax);
        }

        function resetAudioPlayback(button, waveform) {
            if (button) {
                button.textContent = "▶";
            }
            if (waveform) {
                waveform.querySelectorAll(".wave-bar").forEach((bar) => bar.classList.remove("playing"));
            }
            setPersonaSpeaking(false);
        }

        function renderCharacterRail() {
            const rail = document.getElementById("characterRail");
            rail.innerHTML = Object.entries(characterCatalog).map(([key, meta]) => `
                <button class="character-card ${key === currentCharacter ? "active" : ""}" type="button" data-character="${key}" style="--accent:${meta.accent};--accent-soft:${meta.accent_soft};--accent-deep:${meta.accent_deep};">
                    <div class="character-card-top">
                        <div class="character-mark">${meta.mark}</div>
                        <div class="character-pill">${key}</div>
                    </div>
                    <div class="character-name">${meta.title}</div>
                    <p class="character-summary">${meta.summary}</p>
                </button>
            `).join("");

            rail.querySelectorAll(".character-card").forEach((button) => {
                button.addEventListener("click", () => {
                    if (currentAudio) {
                        currentAudio.pause();
                        currentAudio = null;
                    }
                    setPersonaSpeaking(false);
                    currentCharacter = button.dataset.character;
                    currentCharacterName = pickRandomName(metaFor().candidate_names);
                    messageHistory = [];
                    renderCharacterRail();
                    renderPersona();
                    renderWelcomeMessage();
                    requestCharacterPortrait().catch((error) => console.warn("requestCharacterPortrait failed:", error));
                });
            });
        }

        function avatarMark(role) {
            return role === "user" ? "你" : metaFor().mark;
        }

        function appendMessage(role, content, audioUrl = null) {
            const wrapper = document.createElement("div");
            wrapper.className = `message ${role}`;
            wrapper.innerHTML = `
                ${role === "assistant" ? `<div class="avatar">${avatarMark(role)}</div>` : ""}
                <div class="message-body">
                    <div class="message-bubble">${content}</div>
                    ${audioUrl ? `
                        <div class="audio-player">
                            <button class="play-btn" type="button">▶</button>
                            <div class="waveform">${Array.from({ length: 22 }, (_, i) => `<div class="wave-bar" style="height:${10 + (i % 6) * 2}px;"></div>`).join("")}</div>
                            <a class="download-btn" href="${audioUrl}" download="voice_${Date.now()}.wav">下载语音</a>
                        </div>
                    ` : ""}
                </div>
                ${role === "user" ? `<div class="avatar">${avatarMark(role)}</div>` : ""}
            `;

            const playBtn = wrapper.querySelector(".play-btn");
            if (playBtn && audioUrl) {
                playBtn.addEventListener("click", () => toggleAudio(playBtn, audioUrl));
            }

            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderWelcomeMessage() {
            const meta = metaFor();
            chatContainer.innerHTML = "";
            appendMessage("assistant", `我是${currentCharacterName}。\n${meta.tagline}。\n今天想从哪里开始聊？`);
        }

        function showTypingIndicator() {
            const id = `typing-${Date.now()}`;
            const typing = document.createElement("div");
            typing.id = id;
            typing.className = "message assistant";
            typing.innerHTML = `
                <div class="avatar">${avatarMark("assistant")}</div>
                <div class="message-body">
                    <div class="typing-bubble"><span></span><span></span><span></span></div>
                </div>
            `;
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const node = document.getElementById(id);
            if (node) node.remove();
        }

        function toggleAudio(button, audioUrl) {
            const waveform = button.parentElement.querySelector(".waveform");
            const nextSrc = new URL(audioUrl, window.location.href).href;

            document.querySelectorAll(".play-btn").forEach((btn) => {
                if (btn !== button) {
                    resetAudioPlayback(btn, btn.parentElement?.querySelector(".waveform"));
                }
            });

            if (currentAudio && currentAudio.src !== nextSrc) {
                currentAudio.pause();
                currentAudio = null;
            }

            if (!currentAudio) {
                currentAudio = new Audio(audioUrl);
            }

            if (currentAudio.paused) {
                currentAudio.play();
                button.textContent = "❚❚";
                setPersonaSpeaking(true);
                waveform.querySelectorAll(".wave-bar").forEach((bar, index) => {
                    bar.classList.add("playing");
                    bar.style.animationDelay = `${index * 0.05}s`;
                });
                currentAudio.onended = () => {
                    resetAudioPlayback(button, waveform);
                };
                currentAudio.onerror = () => {
                    button.textContent = "!";
                    waveform.innerHTML = "<span style='font-size:12px;color:#667085'>音频加载失败</span>";
                    setPersonaSpeaking(false);
                };
            } else {
                currentAudio.pause();
                resetAudioPlayback(button, waveform);
            }
        }

        async function loadCharacters() {
            try {
                const response = await fetch("/api/characters");
                const data = await response.json();
                if (!data.success) throw new Error(data.error || "加载角色配置失败");
                characterCatalog = data.characters;
                currentVoice = data.default_voice || "default_zh";
                currentCharacter = data.default_character || "gentle";
            } catch (error) {
                console.warn("loadCharacters fallback:", error);
                characterCatalog = fallbackCatalog;
                currentVoice = "default_zh";
                currentCharacter = "gentle";
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            appendMessage("user", message);
            messageHistory.push({ role: "user", content: message });
            messageInput.value = "";
            sendBtn.disabled = true;
            const loadingId = showTypingIndicator();

            try {
                const chatResponse = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: messageHistory, character: currentCharacter })
                });
                const chatData = await chatResponse.json();
                if (!chatData.success) throw new Error(chatData.error || "聊天失败");

                const ttsResponse = await fetch("/api/tts", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        text: chatData.text,
                        emotion: chatData.emotion,
                        character: currentCharacter,
                        voice: currentVoice,
                        style: metaFor().tts_style
                    })
                });
                const ttsData = await ttsResponse.json();
                removeTypingIndicator(loadingId);
                appendMessage("assistant", chatData.text, ttsData.success ? ttsData.voice_url : null);
            } catch (error) {
                removeTypingIndicator(loadingId);
                appendMessage("assistant", `出错了：${error.message}`);
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        async function bootstrap() {
            await loadCharacters();
            currentCharacterName = pickRandomName(metaFor().candidate_names);
            renderCharacterRail();
            renderPersona();
            renderWelcomeMessage();
            bindPersonaParallax();
            document.getElementById("generateVideoBtn").addEventListener("click", () => {
                requestCharacterVideo().catch((error) => console.warn("requestCharacterVideo failed:", error));
            });
            requestCharacterPortrait().catch((error) => console.warn("requestCharacterPortrait failed:", error));
        }

        sendBtn.addEventListener("click", sendMessage);
        messageInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        bootstrap();
    </script>
</body>
</html>
